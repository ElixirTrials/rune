# Deployment stack: API, UI, Postgres, MLflow, Pub/Sub emulator, lora-server.
# Run from repo root: docker-compose -f infra/docker-compose.yml up --build
#
# Port layout:
#   api-service  : host 8000 -> container 8000
#   lora-server  : host 8100 -> container 8000  (no conflict)
#   lora-server health: host 8001 -> container 8001
services:
  api:
    build:
      context: ..
      dockerfile: services/api-service/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=sqlite:////data/rune/rune.db
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ${HOME}/.rune:/data/rune
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    ports:
      - "5000:5000"
    environment:
      AWS_DEFAULT_REGION: eu-west-2
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////data/mlflow/mlflow.db
      --default-artifact-root s3://elixirtrials-949678234935-eu-west-2-artifacts/mlflow/artifacts/
      --serve-artifacts
    volumes:
      - mlflow_data:/data/mlflow
      - ${HOME}/.aws:/root/.aws:ro
    depends_on:
      litestream-restore:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # One-shot restore: pulls latest replica from S3 before mlflow boots.
  # `service_completed_successfully` ensures the server starts only after
  # this exits 0. Idempotent — `-if-replica-exists` no-ops on first ever
  # boot when S3 prefix is empty.
  litestream-restore:
    image: litestream/litestream:0.3.13
    environment:
      AWS_DEFAULT_REGION: eu-west-2
    volumes:
      - mlflow_data:/data/mlflow
      - ${HOME}/.rune:/data/rune
      - ./litestream/litestream.yml:/etc/litestream.yml:ro
      - ${HOME}/.aws:/root/.aws:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        mkdir -p /data/mlflow /data/rune
        litestream restore -if-replica-exists -config /etc/litestream.yml /data/mlflow/mlflow.db
        litestream restore -if-replica-exists -config /etc/litestream.yml /data/rune/rune.db

  # Continuous WAL shipping. Watches both DBs; tolerates the trainer
  # process writing rune.db on the host because the bind mount exposes
  # the same inode.
  litestream:
    image: litestream/litestream:0.3.13
    restart: unless-stopped
    environment:
      AWS_DEFAULT_REGION: eu-west-2
    volumes:
      - mlflow_data:/data/mlflow
      - ${HOME}/.rune:/data/rune
      - ./litestream/litestream.yml:/etc/litestream.yml:ro
      - ${HOME}/.aws:/root/.aws:ro
    depends_on:
      litestream-restore:
        condition: service_completed_successfully
    command: replicate -config /etc/litestream.yml

  pubsub-emulator:
    image: 3apag/pubsub-emulator:latest
    ports:
      - "${PUBSUB_EMULATOR_PORT:-8432}:8432"
    environment:
      PUBSUB_PROJECT_ID: ${PUBSUB_PROJECT_ID:-default}
      PUBSUB_LISTEN_ADDRESS: "0.0.0.0:8432"
    volumes:
      - pubsub_data:/opt/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  lora-server:
    build:
      context: ..
      dockerfile: services/lora-server/Dockerfile
    ports:
      - "${LORA_SERVER_PORT:-8100}:8000"   # host 8100, container 8000 (no conflict with api on 8000)
      - "${LORA_HEALTH_PORT:-8001}:8001"
    volumes:
      - adapters_data:/adapters
      - ${HOME}/.rune:/data/rune
    # Passes through all available GPUs to the container. Adjust `count`
    # to limit GPU access (e.g. count: 1 for single-GPU operation).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - VLLM_BASE_URL=http://localhost:8000/v1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  postgres_data:
  mlflow_data:
  pubsub_data:
  adapters_data:
