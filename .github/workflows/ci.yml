# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'services/**'
              - 'libs/**'
              - 'pyproject.toml'
              - 'mkdocs.yml'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'services/**/docs/**'
              - 'libs/**/docs/**'

  lint-and-type-check:
    runs-on: ubuntu-latest
    needs: paths-filter
    if: github.event_name == 'push' || needs.paths-filter.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint with ruff
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: |
          PY_DIRS=$(for d in services/*/src libs/*/src; do find "$d" -name '*.py' -print -quit 2>/dev/null | grep -q . && echo "$d"; done)
          uv run mypy $PY_DIRS

  test:
    runs-on: ubuntu-latest
    needs: [paths-filter, lint-and-type-check]
    if: github.event_name == 'push' || needs.paths-filter.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest --cov --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml

  docs-build:
    runs-on: ubuntu-latest
    needs: paths-filter
    if: github.event_name == 'push' || needs.paths-filter.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Build documentation
        run: uv run mkdocs build -f mkdocs.yml
